id: ADR-0160
title: "Stage 4 Registry SPI Runtime Promotion — trip-wire evolution + dual-method discovery contract + forward-compatible route handle"
status: proposed
date: 2026-07-02
level: L1
view: process
affects_level: [L1, L2]
affects_view: [logical, process, development]
authors:
  - zhongyiwei
extends:
  - ADR-0066    # Independent Module Evolution — agent-bus module-metadata boundary this ADR exercises
  - ADR-0069    # L0 Ironclad Rules — HD3-001..007 invariants this ADR promotes from design-level to runtime
relates_to:
  - ADR-0077    # Schema-first domain contracts — ICD-Agent-Registry-Discovery is the schema this ADR implements
  - ADR-0151    # L1 feature registry canonical schema — AB-F12 feature entry this ADR advances from design to MVP
  - ADR-0158    # EnginePort transport-agnostic boundary — sibling SPI promotion pattern (bus.spi.engine) this ADR mirrors for bus.spi.registry
context: |
  ICD-Agent-Registry-Discovery (HD3-001..007) has been design-level / contract-only
  since Stage 3. The existing trip-wire test
  `AgentBusRegistryDiscoveryDesignContractTest.no_runtime_registry_production_class_added_in_stage3`
  asserts that NO package named `.registry` or `.discovery` exists under
  `com.huawei.ascend.bus.spi` — its comment says "When Stage 4 admits a registry
  SPI, this assertion is the trip-wire that forces an explicit decision."

  The MVP phase-1 implementation (architecture/L2-Low-Level-Design/agent-bus/
  registry-discovery-runtime-design.cn.md) IS that Stage 4 moment. Three
  intertwined decisions arise, each with real trade-offs and non-obvious
  consequences for future readers:

    1. TRIP-WIRE EVOLUTION. The Stage 3 trip-wire must be retired and replaced
       by positive ArchUnit guards (`AgentBusRegistrySpiPurityTest` +
       `AgentBusRegistryJdbcPurityTest`). Deleting a "no production class may
       exist" test to admit production classes is a one-way door: once the SPI
       is published, callers depend on it, and the design-level escape hatch
       closes. Future readers will ask "why was the trip-wire removed?" and need
       the answer on record.

    2. DUAL-METHOD DISCOVERY CONTRACT. ICD Discovery Query mandates
       `(tenantId, capability)` as the key. But MVP's value proposition is
       natural-language intent discovery — the caller does NOT always know the
       capability name. Two methods with different DTO richness:
         - Method A `discoverBestAgents(tenantId, userQuery, contractVersion, topK)`
           → rich AgentCardDto (business definition fields populated) for
           exploratory callers (Orchestrator/Gateway).
         - Method B `discoverBestAgents(tenantId, capability, userQuery, contractVersion, topK)`
           → minimal AgentCardDto (business definition fields null, ICD 5
           fields only) for capability-scoped routing.
       This diverges from ICD's single-query shape and must be reconciled with
       the ICD's "capability mandatory" rule. The divergence is intentional
       (MVP exploratory value) but is a contract-level change that future
       readers will find surprising without context.

    3. ROUTE HANDLE FORWARD-COMPATIBLE DECODE. HD3-006 mandates opaque route
       handles. Phase 2 (Consul + PGVector) will extend the handle's internal
       structure with Consul coordinates, versioned via a `v1:` prefix. MVP's
       encode never produces the prefix, but MVP's decode MUST recognize it
       from day one — otherwise the rolling-migration window (phase-2 control
       plane encoding `v1:...` handles while phase-1 forwarding layer still
       runs) breaks silently. Designing forward-compatible decode for a format
       MVP never encodes is non-obvious; without this ADR a future reader will
       see dead prefix-detection code and "simplify" it away.

  Additionally, grilling surfaced two structural decisions that reinforce the
  above and warrant ADR-grade permanence:

    4. PORT/ADAPTER LAYERING. JDBC (`java.sql`, `javax.sql`, `JdbcTemplate`,
       `DataSource`) is confined to `com.huawei.ascend.bus.registry.runtime.
       persistence.jdbc`. The `api` / `discovery` / `health` subpackages use
       Spring context annotations but touch the DB only through a Repository
       port implemented in `persistence.jdbc`. This means the design doc's
       `PgMvpDiscoveryServiceImpl` code (which uses `JdbcTemplate` directly in
       `runtime.discovery`) is refactored: JdbcTemplate usage下沉 to
       `AgentRegistryRepository` adapter, `PgMvpDiscoveryServiceImpl` becomes a
       thin caller.

    5. resolveRouteHandle AS SPI METHOD. Rather than exposing
       `RouteHandleCodec` in SPI for the forwarding layer to call directly, the
       SPI method `AgentDiscoveryService.resolveRouteHandle(handle, tenantId)`
       returns a `RouteResolution` (endpointUrl + routeKey + contractVersion).
       `RouteHandleCodec` stays internal to `runtime.discovery`. This keeps the
       route handle encoding format fully encapsulated — even the forwarding
       layer (cross-module consumer) does not depend on the codec. HD3-006 is
       preserved: the "调用方" HD3-006 protects is the Orchestrator business
       logic, not the forwarding delivery infrastructure.

decision: |
  Promote ICD-Agent-Registry-Discovery from Stage 3 design-level to Stage 4
  runtime, governed by the following five locked decisions:

    1. TRIP-WIRE EVOLUTION. Delete
       `no_runtime_registry_production_class_added_in_stage3`. Replace with
       `AgentBusRegistrySpiPurityTest` (spi.registry pure Java: no Spring, no
       JDBC, no Jackson, no WebClient, no Consul, no Servlet, no Netty) and
       `AgentBusRegistryJdbcPurityTest` (Spring/JDBC confined to
       `registry.runtime.persistence.jdbc`; Consul forbidden everywhere in MVP
       as a phase-2 ADR trip-wire). The existing design-level ICD text
       assertions in `AgentBusRegistryDiscoveryDesignContractTest` are kept and
       extended with runtime behavior tests for HD3-001/003/004/005/006.

    2. DUAL-METHOD DISCOVERY CONTRACT. `AgentDiscoveryService` exposes two
       `discoverBestAgents` overloads (Method A without capability, Method B
       with capability) plus `resolveRouteHandle`. Unified `AgentCardDto` with
       `@Nullable` business definition fields (`agentName`, `agentType`,
       `systemProfile`, `toolSchemas`) — Method A populates them, Method B
       leaves them null. Both methods accept optional `contractVersion` filter
       (null = no filter; non-null = exact match; empty result = silent
       `version_unavailable` result, no exception). Both methods accept
       optional `userQuery` for tsvector ranking (null = weight-only ranking).
       ICD revision (capability from mandatory to optional, userQuery added)
       is flagged as a phase-2 H2/H3 review prerequisite.

    3. ROUTE HANDLE FORWARD-COMPATIBLE DECODE.
       `RouteHandleCodec.encode(tenantId, agentId, routeKey, contractVersion)`
       produces `base64(JSON)` with no prefix (MVP format, 4 fields).
       `RouteHandleCodec.decode(handle)` recognizes both: no prefix → MVP
       format (4 fields); `v1:` prefix → phase-2 format (6+ fields, MVP decode
       ignores Consul coordinates, takes 4 fields). This means MVP decode
       handles a format MVP encode never produces — the forward-compat path is
       exercised only in phase-2 rolling migration, but MUST exist from day
       one. Phase 2 adds `encode(tenantId, agentId, routeKey, contractVersion,
       consulAddr, consulPort)` overload producing `v1:base64(JSON)`; decode
       logic unchanged.

    4. PORT/ADAPTER LAYERING. `com.huawei.ascend.bus.registry.runtime.
       persistence.jdbc` is the sole subpackage allowed to import
       `java.sql` / `javax.sql` / `org.springframework.jdbc` / `javax.sql.DataSource`.
       `registry.runtime.api` / `registry.runtime.discovery` /
       `registry.runtime.health` may use Spring context annotations
       (`@RestController`, `@Service`, `@Component`, `@Scheduled`, `@Primary`,
       `@Autowired`) and `RestClient` (for probe HTTP) but MUST NOT touch JDBC
       directly — they call `AgentRegistryRepository` (port interface, declared
       in `spi.registry` or `runtime.persistence.jdbc` package) implemented by
       `JdbcAgentRegistryRepository` in `persistence.jdbc`. The design doc's
       `PgMvpDiscoveryServiceImpl` is refactored: JdbcTemplate queries move to
       `JdbcAgentRegistryRepository`, `PgMvpDiscoveryServiceImpl` becomes a
       thin orchestrator calling the repository + encoding route handles.

    5. resolveRouteHandle AS SPI METHOD.
       `AgentDiscoveryService.resolveRouteHandle(String routeHandle, String
       tenantId)` returns `RouteResolution(endpointUrl, routeKey,
       contractVersion)`. The forwarding layer (Stage 15
       `ForwardingEndpointResolver`) calls this method instead of
       `RouteHandleCodec.decode` + direct PG query. `RouteHandleCodec` is
       internal to `runtime.discovery` (may use Jackson — allowed there).
       Failure modes: malformed handle → `IllegalArgumentException` (400);
       handle points to non-existent entry → `entry_not_found` (404); tenant
       mismatch → `tenant_isolation_violation` (400). HD3-006 preserved: the
       Orchestrator (business logic) never sees `RouteResolution`; only the
       forwarding delivery infrastructure does.

consequences: |
  Positive
  --------
    * Stage 3 → Stage 4 transition is explicit and ArchUnit-enforced. The
      trip-wire retirement is recorded; future readers understand why the
      "no production class" guard was replaced rather than silently deleted.
    * Dual-method contract serves both exploratory (Method A) and
      capability-scoped (Method B) callers with one SPI, avoiding a future
      split when natural-language discovery matures.
    * Route handle forward-compat decode makes phase-2 rolling migration
      safe by construction — no decode-breaking change at the encoding
      boundary.
    * Port/adapter layering confines JDBC to one subpackage, mirroring the
      Stage 12 forwarding pattern (`AgentBusForwardingSpiPurityTest`). The
      `registry.runtime.discovery` package stays focused on discovery
      orchestration, not data access mechanics.
    * `resolveRouteHandle` as SPI method keeps `RouteHandleCodec` internal —
      the encoding format can evolve (v1 → v2 → ...) without breaking
      cross-module consumers.

  Negative / cost
  ---------------
    * ICD-Agent-Registry-Discovery needs revision: `capability` from
      mandatory to optional in Discovery Query; `userQuery` added as new
      mandatory field for Method A. This is a contract-level change requiring
      H2/H3 review before phase-2 production. Flagged as phase-2 prerequisite.
    * Dual-method contract is more surface area than a single method. Callers
      must learn when to use which. Mitigated by clear semantic split
      (exploratory vs scoped) and `@Nullable` field documentation.
    * Forward-compatible decode adds ~10 lines of prefix-detection code that
      MVP encode never exercises — dead-code-elimination tools or cleanup
      PRs may target it. Mitigated by this ADR + a unit test that decodes a
      hand-crafted `v1:...` handle in MVP.
    * Port/adapter refactoring means `PgMvpDiscoveryServiceImpl` in the design
      doc is no longer the literal implementation; the repository port +
      `JdbcAgentRegistryRepository` adapter are new components not shown in
      the design doc's code samples. The design doc's SQL is preserved
      verbatim in the adapter.
    * `resolveRouteHandle` returning `endpointUrl` in `RouteResolution` could
      be misread as violating HD3-006. Mitigated by CONTEXT.md term
      `RouteResolution` explicitly scoping HDL-006's "调用方" to Orchestrator
      business logic, not forwarding infrastructure.

  LOCKSTEP FLAG for the implementation phase
  ------------------------------------------
    Touches authority surfaces. The design is not complete until, in lockstep:
      * `agent-bus/module-metadata.yaml` `spi_packages` declares
        `com.huawei.ascend.bus.spi.registry`; ArchUnit guards
        (`AgentBusRegistrySpiPurityTest` + `AgentBusRegistryJdbcPurityTest`)
        are green;
      * `AgentBusRegistryDiscoveryDesignContractTest` trip-wire test
        `no_runtime_registry_production_class_added_in_stage3` is deleted and
        replaced by positive SPI-purity assertions;
      * `architecture/L2-Low-Level-Design/agent-bus/registry-discovery-runtime-
        design.cn.md` §3.3.1 / §3.3.2 code samples are annotated to reflect
        the port/adapter refactoring (JdbcTemplate下沉 to
        `JdbcAgentRegistryRepository`);
      * ICD-Agent-Registry-Discovery Open Issues list gains "capability from
        mandatory to optional; userQuery added (ADR-0160)" as a phase-2
        revision prerequisite;
      * `CONTEXT.md` Language section carries the resolved terms
        (`RouteHandle`, `AgentCardDto`, `RouteResolution`, `TenantContext`,
        `Method A`, `Method B`, `Pull probe`, `Visibility window`,
        `DEGRADED`).

  Forward-looking
  ---------------
    * MVP phase-1 ships the dual-method SPI + `resolveRouteHandle` + forward-
      compatible decode + port/adapter layering on single PostgreSQL with
      tsvector+GIN. Phase-2 (Consul + PGVector) swaps the
      `AgentDiscoveryService` `@Primary` implementation from
      `PgMvpDiscoveryServiceImpl` to `ConsulProductionDiscoveryServiceImpl`;
      the SPI, DTO, and `RouteResolution` shapes are unchanged.
    * Phase-2 ADR (deferred) will open the Consul-client ArchUnit exemption
      and finalize the ICD revision (capability optional, userQuery
      mandatory). The MVP `AgentBusRegistryJdbcPurityTest` Consul-forbidden
      assertion is the trip-wire that forces that future ADR.
