review_notes: |
  current_state active_guidance: the W1 HTTP-contract invariant (cross-check, not
  replace; DFA-initial status; cancel-is-a-transition) is current governing
  authority and nothing supersedes ADR-0040. active_guidance ALLOWS a non-empty
  non_authoritative_legacy_content, which is used here to QUARANTINE the wire-level
  route x verb x status matrix the raw Decision Outcome inlines — the residual
  flagged by the convergence scan (root family layer-purity-leakage): the L0 section
  4 #37 prose and the L1 agent-service runs-API copy were both drained to
  contract-op/createrun | getrun | cancelrun, but the ADR source — the normative
  origin those delegations rest on — still asserted the verbatim matrix as
  un-quarantined active guidance, and no normalized view existed.

  decision_level L0 / decision_type cross_module_policy: the decision is a
  cross-document runtime invariant binding EVERY active HTTP-contract surface
  (agent-service/ARCHITECTURE.md, ARCHITECTURE.md, the contract catalog, the
  http-api-contracts narrative, and the OpenAPI spec) to one tenant-and-cancel
  story — an L0 cross-module policy, not an L1 module contract. The forbidden L0
  decision_types (implementation_class / source_file_move / method_signature /
  test_class_inventory / private_call_chain) are not used; the concrete
  status/route/verb wire detail is L4-http-status-route-verb material and was pushed
  to non_authoritative_legacy_content + the contract-op facts + the L2 sink rather
  than carried up as authority.

  fact_refs note: ADR-0040 is a Markdown ADR and is NOT present in the apex raw-ADR
  fact projection (architecture/facts/generated/adrs.json), so no adr/0040-* fact id
  exists to cite (inventing one would breach the readable-interpretation discipline).
  The fact_refs therefore name the genuinely existing OpenAPI operation facts
  (contract-op/createrun | getrun | cancelrun, present in
  architecture/facts/generated/contract-surfaces.json) that the quarantined wire
  matrix delegates to. This view is NOT enumerated in docs/adr/normalized/index.yaml
  (which is regenerated from the on-disk views and counts only the YAML corpus); the
  reconcile step owns re-emitting that index and any census reconciliation for the
  Markdown-ADR corpus.
