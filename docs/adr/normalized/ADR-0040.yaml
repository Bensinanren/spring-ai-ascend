clean_decision_summary: |
  One invariant binds every active HTTP-contract document to a single W1
  tenant-and-cancel story: tenant identity is CROSS-CHECKED, never replaced (a JWT
  tenant claim is added alongside the caller-asserted X-Tenant-Id, not substituted
  for it); a run begins in its DFA-initial status; and cancellation is a state
  transition on a surviving run record, not resource deletion. L0 owns the
  invariant; the concrete verbs, routes, status codes, header names, and the
  literal initial RunStatus value are runtime-contract detail below L0 whose
  authority is the OpenAPI surface (facts contract-op/createrun, contract-op/getrun,
  contract-op/cancelrun) and its L2 readable expansion.

active_guidance:
  - "Tenant identity is cross-checked at W1, never replaced: a JWT tenant claim is added ALONGSIDE the caller-asserted X-Tenant-Id (which stays required); the two are compared and a mismatch is rejected. This is additive W1 hardening with no breaking change for W0 callers."
  - "A newly created run begins in its DFA-initial status (RunStatus.PENDING per the ADR-0020 RunLifecycle DFA); there is no CREATED status, and any document asserting CREATED as the initial status is wrong."
  - "Cancellation is a state transition on a surviving run record (the run moves to the terminal CANCELLED state per the Rule R-C.d RunStateMachine DFA), NOT resource deletion; the run record is never physically removed."
  - "L0 owns the cross-check / DFA-initial / cancel-is-a-transition INVARIANT (ARCHITECTURE.md section 4 #37); it does NOT own the wire detail. The verbs, routes, status codes, header names, and the literal initial RunStatus value are runtime-contract facts below L0, whose authority is the OpenAPI surface and its L2 sink."
  - "This ADR remains the documented home of the Gate Rule 16 / 16a forbidden-phrasing list that keeps active documents from re-introducing replacement-implying X-Tenant-Id wording, CREATED as an initial status, or DELETE as the cancel mechanism."

non_authoritative_legacy_content:
  - "The verbatim HTTP route x verb x status matrix inlined in the raw Decision Outcome — POST /v1/runs -> 201, the mismatch -> 403 / missing-JWT -> 401 tenant outcomes, POST /v1/runs/{runId}/cancel -> 200 / 409 Conflict, and the DELETE-is-not-cancel statement — is L4-http-status-route-verb detail, NOT current authority through this ADR. Its authority is the OpenAPI facts contract-op/createrun, contract-op/getrun, contract-op/cancelrun (docs/contracts/openapi-v1.yaml) and the L2 sink architecture/docs/L2/run-http-contract/. The raw block is quarantined as historical reference; the raw ADR carries the same altitude-quarantine banner."
  - "The 'Affected documents (all patched in this cycle)' table and its before/after line-anchored citations (agent-service/ARCHITECTURE.md:34-35, ARCHITECTURE.md:149-153, http-api-contracts.md:92, openapi x-w1-note, contract-catalog.md:10) are a point-in-time remediation snapshot of the 2026-05-13 reconciliation, not standing authority; the live contract surface is the OpenAPI facts + L2 sink."

