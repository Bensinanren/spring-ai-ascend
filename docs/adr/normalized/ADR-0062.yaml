review_notes: |
  Lane: L4-FRAME (ADR-0159) — a cross-frame correlation contract spanning the
  RunContext SPI, the Run aggregate, and the Telemetry Vertical. decision_level L1
  with decision_type cross_frame_contract is in-altitude for L1 (the allowed L1 set
  includes cross_frame_contract; the same classification used for the sibling
  cross-frame ADRs ADR-0074 / ADR-0145 / ADR-0146). The N:M identity RELATIONSHIP
  and the RunContext correlation SURFACE are the standing L1 commitments; naming the
  public SPI as a boundary identity and citing the two enforcers as the mechanism are
  the DEFENSIBLE L1 forms.

  current_state is partial_guidance (NOT active_guidance) deliberately. The
  remediation ledger (docs/governance/adr-remediation-ledger.yaml) records ADR-0062
  at the coarse "ledger-only" granularity as active_guidance — a read of the raw
  decision before any view existed. This finer normalized classification splits that
  single state: the N:M identity decision still GOVERNS (active_guidance clauses),
  while the raw Decision/Enforcers sections additionally carry lower-level
  persistence + method-signature content that this view demotes to
  non_authoritative_legacy_content — which is exactly the partial_guidance meaning
  ("some guidance still active; some content is lower-level"). This mirrors the
  ADR-0068 precedent (ledger/raw self-label active vs. view partial_guidance because
  a sub-clause is non-authoritative legacy). The ledger normalized_path backfill and
  the docs/adr/normalized/index.yaml enumeration + counts are owned by the
  index/ledger reconcile step, not by this view.

  Demotion scope = exactly the loci the 2026-05-29 review verdict names and the
  LPV-l0-run-trace-id-notnull grandfather row tolerates: the V2__run_trace_id_notnull.sql
  Flyway reference, the column-nullability transition, the 32-char-lowercase-hex
  literal, the RunContext.traceId()/spanId()/sessionId()/traceContext() accessor
  signatures, the four-field MDC carrier shape, and the REPLACE(...) backfill SQL. The
  l2_refs / contract_refs / fact_refs above are the migrate_to homes that row already
  names (architecture/facts/generated/code-symbols.json + Flyway migrations +
  architecture/docs/L2/telemetry-vertical/). No new ADR id or graph edge is minted;
  this view re-states and curates only. Flagged for human review to confirm the
  cross_frame_contract / L1 / logical altitude choice and the partial_guidance split.
