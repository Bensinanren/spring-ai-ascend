clean_decision_summary: |
  Trace, Run, and Session are three independent identities related N:M (the
  Langfuse model), chosen over 1:1 (run_id == trace_id) when the Telemetry
  Vertical scope was finalised. The standing cross-frame contract is the identity
  RELATIONSHIP and the correlation SURFACE: every persisted Run is correlatable to
  exactly one Trace and N:M to Sessions; the RunContext SPI is the single in-kernel
  carrier that exposes the trace / span / session correlation identity to runtime
  code; and a child Run spawned across a suspend boundary inherits its parent's
  Session while federating to a new Trace whose root span records the parent linkage
  as an attribute. The concrete persistence realisation of that relationship (the
  named Flyway migration, the column-nullability progression, the 32-char-hex
  rendering, the MDC carrier field set, and the reversal-path SQL) is L2 / contract /
  generated-fact detail, NOT part of the standing L1 decision (see
  non_authoritative_legacy_content).

active_guidance:
  - "N:M Trace ↔ Run ↔ Session identity: Trace, Run, and Session are independent identities; multiple Runs MAY share a Trace or a Session via a common session correlation. The 1:1 (run_id == trace_id) shape was considered and rejected; reversal to 1:1 is additive and bounded, so the more expressive N:M model is the standing choice (Rule D-1 strongest-interpretation default aligning with Langfuse's conversation/session concept)."
  - "RunContext as the single correlation carrier: the RunContext SPI is the in-kernel boundary identity that exposes the Run's trace / span / session correlation to runtime code (companion to the TraceContext SPI of ADR-0061). Naming this public SPI as a boundary identity is the L1 commitment; the typed accessor SHAPES are owned by the runcontext SPI-shape fact (fact_refs), not restated as authority here."
  - "Child-Run trace federation across suspend: a Run suspended via SuspendForChild spawns a child Run that inherits the parent's Session (mandatory) and, under the default policy, federates to a NEW Trace whose root span records the parent-trace linkage as an attribute rather than nesting inside a still-open parent trace (so long suspends do not break fixed-window exporters or inflate tail-sampling buffers). An opt-in alternate — continue the parent Trace as a nested sub-span for sub-second suspends — is reserved for a later wave. This is the structural federation choice; the discriminator field and span-attribute naming are L2 sequence detail."
  - "Cross-suspend trace propagation lives on the persisted Run aggregate, not in volatile context: a child resumed long after its parent suspended locates the parent's Trace by reading the parent Run row, and the resume envelope carries the Session so a fresh process can re-establish correlation at resume time. This is consistent with the ADR-0024 suspension-write-atomicity invariant — the trace identity is part of the atomic suspend write."
  - "Posture-gated nullability as a STRUCTURAL obligation (the realisation is demoted): trace correlation is mandatory and session correlation is mandatory under the research/prod posture from the W2 boundary, while both MAY be absent at the L1.x design horizon. The structural commitment 'every Run is trace-correlatable; session correlation becomes mandatory under hardened posture' stays at L1; the exact nullable→NOT-NULL column transition, its wave boundary phrasing, and the migration that effects it are persistence detail (see non_authoritative_legacy_content)."

non_authoritative_legacy_content:
  - "The named Flyway migration `V2__run_trace_id_notnull.sql` (raw §1, Enforcers) and the SQL backfill of legacy rows with a random hex value before the NOT-NULL ALTER are L3-persistence detail. They migrate to the Flyway migration sources + architecture/docs/L2/telemetry-vertical/. As of the DESIGN-phase horizon the named migration does not yet exist on disk (the live V2 migration is the idempotency-dedup one); the filename is a forward-looking design pointer, which is precisely why it is not standing L1 authority."
  - "The exact column-nullability TRANSITION wording — `Run.traceId` nullable at L1.x and NOT NULL from W2, `Run.sessionId` nullable at L1.x and W2 dev but NOT NULL in posture=research/prod from W2 (raw §1) — is persistence-schema detail. The DEFENSIBLE structural residue (trace correlation mandatory; session correlation mandatory under hardened posture) is restated in active_guidance; the column-by-column nullability mechanics belong to architecture/docs/L2/telemetry-vertical/ and the persistence schema."
  - "The `Run.traceId` value form `32-char lowercase hex` (the OTel-native 16-byte trace ID rendered; raw §1, §4, Enforcers) is a field-encoding L3 detail owned by the persistence schema + architecture/docs/L2/telemetry-vertical/, not an L1 identity invariant."
  - "The RunContext accessor SIGNATURES `RunContext.traceId() : String`, `RunContext.spanId() : String`, `RunContext.sessionId() : String`, and `RunContext.traceContext()` (raw §2) are L7-method-signature detail. They are fact-owned on the runcontext SPI-shape fact (fact_refs: code-symbol/com-huawei-ascend-bus-spi-engine-runcontext public_methods[]); the L1 commitment is that RunContext EXPOSES the correlation identity, not the typed accessor list. The null-tolerance contract on the session accessor at the design horizon is likewise the SPI-shape fact's concern."
  - "The four-field MDC carrier SHAPE and ORDER populated at the HTTP edge — tenant_id, then trace_id, then span_id, then run_id, with named Logback filters and the session_id exclusion (raw §5) — is L4/L2 runtime-wire detail owned by docs/telemetry/policy.md + architecture/docs/L2/telemetry-vertical/process.md + architecture/docs/L2/run-http-contract/development.md. The structural carrier commitment (RunContext is the single in-kernel correlation carrier) stays; the MDC field set / order / filter names are not L1 authority."
  - "The reversal-cost recipe's SQL backfill expression `Run.traceId = REPLACE(Run.runId::text, '-', '')` and the DROP-COLUMN / accessor-removal steps (raw §6) are L3-persistence + L2-migration mechanics that demonstrate reversibility; the standing L1 statement is only that the N:M→1:1 reversal is additive and bounded. The concrete SQL belongs to the persistence schema + architecture/docs/L2/telemetry-vertical/."

