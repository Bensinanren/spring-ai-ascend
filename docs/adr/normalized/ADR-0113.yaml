# Normalized view of ADR-0113 — a READABLE INTERPRETATION layer over the raw
# ADR source. It re-states relationships (supersedes / superseded_by) and curates
# which clauses still govern; it INVENTS no ADR ids and no relationships, and it
# never outranks a generated fact. Authority cascade: generated facts > DSL >
# Card/prose (ADR-0154 / ADR-0160). Schema: docs/governance/adr-governance-policy.yaml
# (required fields + state invariants) + docs/governance/adr-taxonomy.yaml
# (decision-level altitude). Authority: ADR-0160.

adr: ADR-0113
raw_path: docs/adr/0113-hook-ordering-failsafe-coherence-and-tie-break.yaml

# partial_guidance: the two-level hook failure semantics (chain fail-fast vs
# invocation failsafe) and the requirement for a deterministic tie-break still
# govern as a cross-cutting invariant; the concrete comparator code and the named
# test classes are L2 detail and now lower-level.
current_state: partial_guidance

# Decided at L0: a system-wide behavioral invariant on every hook chain (two-level
# failure propagation + deterministic ordering), with the canonical contract surface.
decision_level: L0
affected_levels:
  - L0
  - L1
  - L2
  - contract
  - facts
view: process
# A system-wide behavioral invariant that holds for every hook chain is a
# governance_invariant (adr-taxonomy decision_levels.L0.allowed_decision_types).
decision_type: governance_invariant

clean_decision_summary: >
  The hook chain has two INDEPENDENT failure-propagation scopes, and the prior
  self-contradiction ("ordered and failsafe" vs "fail-fast inside the dispatcher")
  is resolved by naming them separately: the chain scope (within one hook point)
  defaults to fail-fast; the invocation scope (the LLM/tool call boundary) defaults
  to failsafe, with a safety-critical override that short-circuits the invocation.
  "Ordered" means the dispatch sequence is deterministic and registration-driven,
  and same-order ties break on a deterministic, framework-independent discriminator
  rather than the unstable bean-name fallback (the concrete ordering rule and
  comparator are L2 / hook-contract detail, not L1 authority). The error-handling
  hook position is always best-effort and is
  not subject to the safety-critical short-circuit. The failure-propagation semantics
  are mirrored across three surfaces (L0 kernel, L1 module prose, and the canonical
  hook contract) with cross-surface parity enforced.

active_guidance:
  - >
    Two-level failure semantics is the governing invariant: chain scope (within one
    hook point) is fail-fast by default; invocation scope (the model/tool call
    boundary) is failsafe by default with a safety-critical override that short-
    circuits. "Ordered" means the dispatch sequence is deterministic and
    registration-driven (not framework-discovery order); "failsafe" applies at the
    invocation boundary, not the chain boundary. Both terms are used honestly and
    consistently. The concrete ordering rule (per-position ascending/descending
    sequence) is L2 detail, not L1 authority (see non_authoritative_legacy_content).
  - >
    Same-@Order ties MUST resolve by a deterministic, framework-independent
    discriminator rather than the framework's bean-name fallback, so dispatch order
    is stable across JVMs and framework versions. The CONCRETE tie-break comparator
    (which discriminator, the comparator expression, its lexicographic direction) is
    L2 FunctionPoint detail and is NOT L1 authority; it is owned at L2 / the hook
    contract, not this view (see non_authoritative_legacy_content).
  - >
    The error-handling hook position is best-effort: the entire chain fires for every
    error, outcomes aggregate "first non-proceed wins", and the safety-critical
    short-circuit does NOT apply there (it would create infinite regress).
  - >
    The failure-propagation semantics live in three parity-locked surfaces — the L0
    kernel constraint, the agent-middleware L1 prose, and the canonical hook contract
    (docs/contracts/engine-hooks.v1.yaml#failure_propagation) — with cross-surface
    parity enforced by the parity gate (Rule G-8).

non_authoritative_legacy_content:
  - >
    The concrete tie-break ALGORITHM (the discriminator, its comparator
    expression, and its lexicographic direction) is L2 FunctionPoint detail and is
    NOT L1 authority; it is owned by the live code-symbol fact
    code-symbol/com-huawei-ascend-middleware-hookdispatcher, the L2 hook-dispatch
    frame architecture/docs/L2/fp-hook-dispatch/, and the hook contract, NOT
    restated here. L1 retains only the invariant that the tie-break is
    deterministic and framework-independent. (This view names the algorithm's home
    rather than inlining it: the readable-interpretation layer carries no verbatim
    L2 detail and invents no comparator signature.)
  - >
    The concrete per-position registration-order rule (which @Order direction each
    hook position fires in, and the unwind order) is L2 FunctionPoint detail and is
    NOT L1 authority; the dispatch sequence is owned by the hook contract anchor
    docs/contracts/engine-hooks.v1.yaml#ordering and the L2 hook-dispatch frame
    architecture/docs/L2/fp-hook-dispatch/, NOT restated here. L1 retains only the
    invariant that ordering is deterministic and registration-driven rather than
    framework-discovery-driven.
  - >
    Which named test classes assert the tie-break determinism and the ON_ERROR
    safety-critical carve-out is a test inventory owned by the live test facts
    architecture/facts/generated/tests.json (resolved through the FunctionPoint
    test_refs[]); this view delegates that inventory to the fact layer rather than
    enumerating test-class names.
  - >
    The "Today vs Target" wording (Fail discarded today; Fail -> Run.FAILED at a W2
    Telemetry target) is a point-in-time roadmap snapshot, not a governing clause;
    the live contract + code facts own the current behavior.

