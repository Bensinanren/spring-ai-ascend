review_notes: >
  Layer-purity: this ADR roots its decision in the L0 kernel as a system-wide
  invariant on every hook chain (two-level failure semantics + the REQUIREMENT of a
  deterministic, registration-driven ordering with a framework-independent
  tie-break), classified here as L0 governance_invariant. The concrete ordering
  ALGORITHM — the per-position registration-order direction and the lexicographic
  tie-break discriminator — is L2 FunctionPoint detail (an L5-filter-ordering
  mechanism) and is recorded as non_authoritative_legacy_content rather than
  active_guidance; this view NAMES that algorithm's home (the L2 hook-dispatch frame
  architecture/docs/L2/fp-hook-dispatch/ + the hook contract) rather than restating
  the algorithm, so the readable-interpretation layer hosts no verbatim L2 detail
  and invents no comparator signature or test-class name (the authority chain bars
  this layer from minting IDs or relationships, so it also bars it from inlining a
  verbatim L2 copy). active_guidance now states only the deterministic-tie-break
  and deterministic-ordering INVARIANTS; the comparator algorithm is owned by the
  live code-symbol fact code-symbol/com-huawei-ascend-middleware-hookdispatcher and
  the fp-hook-dispatch frame, and which tests assert these behaviors is owned by the
  live test facts (architecture/facts/generated/tests.json), not enumerated here.
  Drain note (layer-purity-leakage family): the L0 allow-list previously
  grandfathered the same L5 ordering mechanism as LPV-l0-hook-chain-ordering, but
  that row was removed 2026-05-30 once the L0 §4 #16 body was drained to delegation
  form; this view is the ADR-lane analogue of that drain — the legacy clauses are
  reduced to the invariant + a fact-ID/contract/L2 pointer rather than frozen behind
  a dated grandfather row, so there is no verbatim leak left to quarantine and no
  sunset_date is owed. AMBIGUITY FLAGGED FOR HUMAN REVIEW: the decision is equally
  defensible as an L1 cross_frame_contract, since its canonical authority is a
  contract surface (engine-hooks.v1.yaml#failure_propagation) spanning the
  middleware frame and the invocation boundary. The view chose L0
  governance_invariant because the raw ADR sites the two-level semantics in the L0
  kernel constraint as an invariant over every hook; the reconcile/ledger step may
  prefer the L1/contract reading. current_state is unambiguous (partial_guidance).
