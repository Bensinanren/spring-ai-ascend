# Layer-Purity Policy — what each architecture layer OWNS and FORBIDS.
#
# Authority: ADR-0159 (Progressive Learning Curve and Authority Lanes) §7
#   "Layer purity as a lane invariant"; ADR-0144 (Layer-vs-Package matrix);
#   ADR-0068 (Layered 4+1 and Architecture Graph). The adjudicated verdict
#   that motivates this file (the "L0/L1 carries L2/code detail" critique is
#   TRUE) is recorded in
#   docs/governance/remediation-inventory/layer-purity-scan.md §0 and
#   ADR-0159 context; it is NOT re-litigated here.
#
# What this file IS. The single machine-readable statement of the
#   owns/forbids category sets per architecture layer (L0 / L1 / L2). It
#   turns the verdict's DEFENSIBLE-vs-LEAKED rubric into named categories so
#   a future executable gate (authored + promoted in the G-27..G-33 band by
#   the remediation waves that consume ADR-0159 §9, NOT by this file) can
#   classify any block of layer prose as in-layer or leaked. It is policy
#   DATA; it ships no rule, enforcer, baseline, or DSL element.
#
# What this file is NOT. A rule card, an enforcer row, a migration plan, or
#   a grandfather/exception list. Known not-yet-migrated violations and their
#   per-entry sunset dates live in the sibling file
#   docs/governance/layer-purity-temporary-violations.yaml. The authority
#   cascade (generated facts > DSL > Card/prose) is untouched here.
#
# Relationship to the authority lanes. ADR-0159 §2 partitions the eight
#   learning-curve nodes into eight single-owner authority LANES (who
#   produces what). This file is the layer-purity COMPLEMENT of that lane
#   partition: the lanes say which surface owns a node; layer purity says
#   which DETAIL CATEGORY is allowed to appear in the L0 / L1 architecture
#   prose at all. The two agree by construction — L0 owns global constraints,
#   L1 owns frame boundaries + public surfaces, and implementation truth
#   (L2 + contracts + facts) is the only home for the leaked categories.
#
# Schema:
#   schema_version  - integer, bumped when fields are added.
#   authority       - the ratifying ADR id.
#   last_updated    - ISO yyyy-mm-dd (UTC). The freshness convention is UTC;
#                     a local +08 date can be UTC-future and trip a freshness
#                     gate (see recurring-defect-families.yaml header note).
#   status          - advisory | blocking. Advisory until the G-27..G-33 lane-
#                     purity gate is authored and promoted to blocking per
#                     ADR-0159 §9 (clean workspace gate + fact-layer byte
#                     identity). This field reflects the POLICY posture, not a
#                     contract-status enum (this file is not a
#                     docs/contracts/*.v1.yaml, so Rule 62 does not apply).
#   categories[]    - the canonical category vocabulary. Each row:
#       id          - stable kebab id (defensible D1..D3, leaked L1..L8). These
#                     mirror the verdict rubric in layer-purity-scan.md §0 and
#                     are the only tokens a temporary-violation row may cite.
#       kind        - defensible | leaked.
#       title       - one-line human title.
#       definition  - what the category covers.
#       owned_at    - layers where prose in this category is IN-LAYER (allowed).
#       forbidden_at- layers where prose in this category is a LEAK.
#       home        - the authoritative home for leaked detail (where it MUST
#                     migrate to); empty for defensible categories.
#   layers[]        - per-layer owns/forbids roll-up over the categories above,
#                     plus the layer's authoritative producing surface. This is
#                     a derived convenience view; the categories[] table is the
#                     normative source where the two disagree.
#   governed_surfaces[] - surfaces OTHER than the L0/L1 architecture documents on
#                     which this same leaked-category vocabulary is enforced (or is
#                     DECLARED to be enforced, gate pending), with the gate /
#                     enforcer that does so and the per-surface dated grandfather
#                     list it consumes. The L0/L1 documents are covered by Rule G-27
#                     (E194/E195); this list records the EXTENSIONS to the surfaces
#                     that sit ABOVE the L0/L1 prose in the authority cascade
#                     (generated facts > DSL > Card/prose) and demonstrably accrete
#                     the same leaked categories — and must therefore be held to the
#                     same altitude. Per that cascade two tiers outrank the prose:
#                       (a) the capability-status ledger `allowed_claim` narrative
#                           (Card/prose tier, but a higher-authority surface than the
#                           L0/L1 documents the two existing helpers scan); and
#                       (b) the STRICTLY-HIGHER DSL tier — the element `description`
#                           strings of the authored Structurizr fragments
#                           (architecture/features/{engineering-frames,function-
#                           points,verification,capabilities}.dsl) plus the
#                           architecture/profile/*.yaml descriptors — which sit
#                           directly under the generated facts and above every prose
#                           surface. The DSL `description` is a free-form narrative
#                           field with no altitude guard, exactly like an
#                           `allowed_claim`, and it is PRONE to the same leaked
#                           categories (it has historically carried method call
#                           chains and arrow dispatch in function-point
#                           descriptions, route x verb + DFA in the same, enumerated
#                           SPI type inventories in frame descriptions, and
#                           named-test runtime-behaviour phrases in verification
#                           descriptions). The CURRENT live leak set is enumerated,
#                           dated, and element-anchored in the per-surface
#                           grandfather list (a concurrent DSL-altitude drain has
#                           since reduced most of those to structural synopses; the
#                           field still has no guard, so the surface stays
#                           registered). Registering ONLY the ledger (tier a) and
#                           stopping short of tier (b) under-scopes the
#                           by-authority-surface principle the ledger entry
#                           generalized — so the DSL tier is registered here too.
#                     It is a registry, not a second vocabulary: every entry reuses
#                     categories[] unchanged. Each row:
#       id                - stable kebab id for the governed surface.
#       surface           - the file (or file-glob) the leaked-category vocabulary
#                           applies to.
#       field             - the narrative field within that surface that is scanned
#                           (the structural keys are NOT scanned — they are the D2
#                           development-view evidence index, not a behavioural claim).
#       coverage_status   - REQUIRED enum recording how far this surface's coverage
#                           has been REALIZED, distinct from the policy-level
#                           `status` (advisory|blocking) above which is the ledger
#                           gate's RUNG:
#                             gated            - an executable enforcer + gate rule
#                                                already scan this surface today
#                                                (the ledger row). `rule`,
#                                                `enforcer`, `gate_rule`, `helper`
#                                                name the LIVE mechanism.
#                             declared-gate-pending
#                                              - this surface is REGISTERED as in
#                                                scope of the same verdict and its
#                                                per-surface grandfather list exists,
#                                                but the executable enforcer + gate
#                                                rule are NOT yet authored. Authoring
#                                                + promoting them is a follow-up wave
#                                                in the G-27..G-33 / E-band per
#                                                ADR-0159 §9 (this policy DATA file
#                                                ships no rule or enforcer). `rule`,
#                                                `enforcer`, `gate_rule`, `helper`
#                                                then carry the RESERVED (free,
#                                                not-yet-allocated) identifiers the
#                                                follow-up wave will use, so the
#                                                registry is the durable record of
#                                                BOTH the coverage decision and the
#                                                ids reserved for it. The grandfather
#                                                list is authored now so the gate, on
#                                                landing, starts changed-files-
#                                                blocking against a dated baseline
#                                                rather than hard-blocking the corpus
#                                                (avoids the ratchet-promotion-
#                                                without-baseline defect).
#       rule / enforcer / gate_rule / helper - the gate mechanism for this surface:
#                           LIVE when coverage_status=gated, RESERVED (free ids) when
#                           coverage_status=declared-gate-pending.
#       grandfather_list  - the per-surface dated grandfather YAML the gate consumes
#                           (reuses categories[]; same closed-list + sunset_date
#                           discipline as the L0/L1 list).
#       forbids_categories - the leaked categories enforced on this surface (a subset
#                           of categories[] kind=leaked).
#       rationale         - why this surface outranks the prose and how its scan is
#                           bounded (which field, which keys are spared).

schema_version: 3
authority: ADR-0159
last_updated: 2026-05-30
status: advisory

# --------------------------------------------------------------------------
# Category vocabulary (the verdict's DEFENSIBLE-vs-LEAKED rubric, named).
# --------------------------------------------------------------------------
categories:

  # ----- DEFENSIBLE at L0/L1 (keep) -----
  - id: D1-spi-boundary-identity
    kind: defensible
    title: SPI named as a boundary identity
    definition: >
      Naming a public SPI as a boundary identity — its fully-qualified name
      plus a one-line role — WITHOUT inlining method bodies, call chains, or
      wire payloads. The single-line SPI signature is the boundary's identity,
      not a method body.
    owned_at: [L0, L1, L2]
    forbidden_at: []
    home: ""

  - id: D2-package-decomposition
    kind: defensible
    title: Development-view package / module decomposition
    definition: >
      Which package or module owns which concern — the development view's
      module layout and target directory tree. Structural, not behavioural.
    owned_at: [L0, L1, L2]
    forbidden_at: []
    home: ""

  - id: D3-enforcer-citation
    kind: defensible
    title: ArchUnit enforcer / gate rule cited as the mechanism
    definition: >
      Citing an ArchUnit enforcer or gate rule as the MECHANISM that guards a
      constraint — the enforcer name and the constraint identity, not the
      runtime behaviour the enforcer asserts.
    owned_at: [L0, L1, L2]
    forbidden_at: []
    home: ""

  # ----- LEAKED (migrate to L2 / contracts / generated facts) -----
  - id: L1-method-call-chain
    kind: leaked
    title: Method call chains
    definition: >
      Inter-method dispatch sequences and named method-to-method call chains
      (e.g. "withStatus -> validate", "resolve(envelope) -> execute").
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "architecture/docs/L2/<frame>/ (FunctionPoint design)"

  - id: L2-runtime-sequence
    kind: leaked
    title: Runtime sequences
    definition: >
      Sequence diagrams, race orderings, and winner/loser CAS narratives —
      the runtime ordering of operations across collaborators.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "architecture/docs/L2/<frame>/ (process / sequence view)"

  - id: L3-sql-rls-persistence
    kind: leaked
    title: SQL / RLS / GUC / persistence detail
    definition: >
      SET LOCAL GUC statements, ON CONFLICT / WHERE clauses, RLS policy
      wiring, migration-file names, CHECK-constraint enums, table-level
      persistence design.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "architecture/docs/L2/<frame>/ + Flyway migrations (persistence design)"

  - id: L4-http-status-route-verb
    kind: leaked
    title: HTTP status / route-verb / header behaviour
    definition: >
      Concrete HTTP status codes (201/400/403/404/409/422/500), route x verb
      semantics (POST-not-DELETE), and header parse/emit rules.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "docs/contracts/*.v1.yaml (OpenAPI) + architecture/docs/L2/<frame>/"

  - id: L5-filter-ordering
    kind: leaked
    title: Filter ordering
    definition: >
      Numeric filter order values, @Order tie-break algorithms, and
      chain-position rules — runtime dispatch ordering.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "architecture/docs/L2/<frame>/ (filter-chain design)"

  - id: L6-wire-format
    kind: leaked
    title: Wire formats
    definition: >
      Concrete wire encodings (OTLP/HTTP), attribute namespaces
      (gen_ai.* / langfuse.*), buffer sizes + overflow strategy, sampling
      rates.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "docs/contracts/*.v1.yaml + docs/telemetry/policy.md"

  - id: L7-method-signature
    kind: leaked
    title: Method signatures
    definition: >
      Parameter lists, return types, JVM-level shapes, enumerated SPI method
      lists, type-shape classification (interface-vs-record), forbidden method
      names, canonical field names. Distinct from D1: a one-line SPI identity
      is allowed; a parameter/return inventory is not.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "docs/contracts/*.v1.yaml (SPI) + architecture/facts/generated/code-symbols.json"

  - id: L8-test-class-inventory
    kind: leaked
    title: Test-class inventories
    definition: >
      Named test classes with their asserted runtime behaviour — a test
      catalogue embedded in layer prose.
    owned_at: [L2]
    forbidden_at: [L0, L1]
    home: "architecture/facts/generated/tests.json (+ FunctionPoint test_refs[])"

# --------------------------------------------------------------------------
# Per-layer owns/forbids roll-up (derived convenience view).
# --------------------------------------------------------------------------
layers:

  - id: L0
    name: L0 Architecture
    authority_surface: architecture/docs/L0/ARCHITECTURE.md
    authority_node: N3
    authority_lane: L3-L0ARCH
    owns: >
      System boundary and global, cross-module numbered constraints only.
      Defensible identity statements (D1 SPI boundary identity, D2 package /
      module decomposition, D3 enforcer citation) are in-layer.
    owns_categories: [D1-spi-boundary-identity, D2-package-decomposition, D3-enforcer-citation]
    forbids_categories:
      - L1-method-call-chain
      - L2-runtime-sequence
      - L3-sql-rls-persistence
      - L4-http-status-route-verb
      - L5-filter-ordering
      - L6-wire-format
      - L7-method-signature
      - L8-test-class-inventory
    self_declared_scope: >
      L0 §0.6 declares it does NOT carry runtime contracts (wire shapes,
      route behaviour, SPI signatures). This policy makes that self-claim
      enforceable: any L1..L8 leaked category appearing in the L0 root is a
      violation.

  - id: L1
    name: L1 Module / EngineeringFrame
    authority_surface: architecture/docs/L1/<module>/ (+ frames/<frame-id>.md)
    authority_node: N4
    authority_lane: L4-FRAME
    owns: >
      Frame boundaries and public surfaces — boundary identity, package root,
      the public API/SPI surface as identity, and the inter-frame contract
      pointer. Defensible identity statements (D1, D2, D3) are in-layer.
    owns_categories: [D1-spi-boundary-identity, D2-package-decomposition, D3-enforcer-citation]
    forbids_categories:
      - L1-method-call-chain
      - L2-runtime-sequence
      - L3-sql-rls-persistence
      - L4-http-status-route-verb
      - L5-filter-ordering
      - L6-wire-format
      - L7-method-signature
      - L8-test-class-inventory
    self_declared_scope: >
      An L1 document MUST NOT carry a literal "L2 zone" of inlined
      implementation detail. Delegating a Boundary Contract to L2 (naming the
      zone + its DFX expectations, per Rule G-1.1.c) is the DEFENSIBLE way to
      reference L2; inlining persistence / sequence / status detail inside
      that delegation is the leak.

  - id: L2
    name: L2 Implementation / FunctionPoint detail
    authority_surface: architecture/docs/L2/<frame>/ + docs/contracts/*.v1.yaml + architecture/facts/generated/*.json
    authority_node: N5
    authority_lane: L5-FUNCTIONPOINT
    owns: >
      Implementation truth — method call chains, runtime sequences,
      persistence design, HTTP/route/header behaviour, filter ordering, wire
      formats, method signatures, and test inventory. This is the
      authoritative HOME for every leaked category; the cross-boundary promise
      portions live in the contract surface (L6-CONTRACT) and the generated
      facts (L7-FACTS).
    owns_categories:
      - D1-spi-boundary-identity
      - D2-package-decomposition
      - D3-enforcer-citation
      - L1-method-call-chain
      - L2-runtime-sequence
      - L3-sql-rls-persistence
      - L4-http-status-route-verb
      - L5-filter-ordering
      - L6-wire-format
      - L7-method-signature
      - L8-test-class-inventory
    forbids_categories: []
    self_declared_scope: >
      L2 carries no global policy, product claim, or cross-module principle
      (those are owned upstream at L0/N1/N2); it is the landing zone for the
      detail the upper layers delegate down.

# --------------------------------------------------------------------------
# Governed surfaces beyond the L0/L1 architecture documents.
#
# The L0/L1 markdown documents are covered by Rule G-27 (helpers E194
# check_layer_purity.py + E195 check_l2_detail_sink.py). Per the authority
# cascade (generated facts > DSL > Card/prose) some NON-document surfaces
# OUTRANK the L0/L1 prose yet were unscanned, so they organically accreted the
# same leaked categories. Each row here registers such a surface, the gate /
# enforcer that applies THIS vocabulary to it (LIVE when coverage_status=gated;
# RESERVED ids when coverage_status=declared-gate-pending), and the per-surface
# dated grandfather list that gate consumes. These are EXTENSIONS, not a second
# vocabulary: every entry reuses categories[] above unchanged.
#
# Two tiers outrank the L0/L1 prose and are both registered below:
#   1. status-ledger-allowed-claim — the capability-ledger `allowed_claim`
#      narrative (gated TODAY by Rule G-34 / E201).
#   2. dsl-element-description — the STRICTLY-HIGHER DSL tier: the element
#      `description` strings of the authored Structurizr fragments under
#      architecture/features/*.dsl (function-points / engineering-frames /
#      verification / capabilities). The ledger entry generalized the
#      by-authority-surface insight but stopped at the Card/prose-tier ledger;
#      the DSL tier sits ABOVE the prose in the same cascade and demonstrably
#      carries the same leaks, so coverage that omits it is incomplete. It is
#      registered declared-gate-pending: in scope of the verdict with its dated
#      grandfather list authored now, the executable enforcer + gate rule to be
#      authored by a follow-up wave (ADR-0159 §9) under the RESERVED ids below.
# --------------------------------------------------------------------------
governed_surfaces:

  - id: status-ledger-allowed-claim
    surface: docs/governance/architecture-status.yaml
    field: allowed_claim
    coverage_status: gated
    rule: G-34
    enforcer: E201
    gate_rule: 151
    helper: gate/lib/check_status_claim_altitude.py
    grandfather_list: docs/governance/layer-purity-status-ledger-grandfather.yaml
    forbids_categories:
      - L1-method-call-chain
      - L2-runtime-sequence
      - L3-sql-rls-persistence
      - L4-http-status-route-verb
      - L5-filter-ordering
      - L6-wire-format
      - L7-method-signature
      - L8-test-class-inventory
    rationale: >
      The capability-status ledger's `allowed_claim` is a free-form narrative
      field with no altitude guard, and the ledger OUTRANKS the L0/L1 prose under
      the authority cascade — so a runtime-detail leak there is at least as
      significant as an L0/L1 prose leak. E201 scans every `allowed_claim` value
      with the SAME leaked-category vocabulary (it imports the canonical trigger
      library from check_layer_purity.py), reports a leak not redeemed by a
      still-open, capability-precise row in the per-surface grandfather list, and
      runs changed-files-blocking (a PR editing the ledger may not add or worsen
      a claim-altitude leak). It never edits the ledger (owned by the
      status-ledger reconcile step) and never scans the ledger's structural keys
      (implementation / tests file lists, l0_decision, enforcer rows — those are
      the D2 development-view evidence index, not a behavioural claim).

  - id: dsl-element-description
    surface: architecture/features/*.dsl
    field: element_description
    coverage_status: declared-gate-pending
    # RESERVED (free, not-yet-allocated) ids. The executable enforcer, gate-rule
    # script, and rule card are authored + promoted by a follow-up wave in the
    # G-27..G-33 / E-band per ADR-0159 §9 — NOT by this policy DATA file (which
    # ships no rule or enforcer). These ids are recorded so the registry is the
    # durable home of both the coverage decision and the ids reserved for it.
    rule: G-35
    enforcer: E202
    gate_rule: 152
    helper: gate/lib/check_dsl_description_altitude.py
    grandfather_list: docs/governance/layer-purity-dsl-grandfather.yaml
    scanned_fragments:
      - architecture/features/function-points.dsl
      - architecture/features/engineering-frames.dsl
      - architecture/features/verification.dsl
      - architecture/features/capabilities.dsl
    forbids_categories:
      - L1-method-call-chain
      - L2-runtime-sequence
      - L3-sql-rls-persistence
      - L4-http-status-route-verb
      - L5-filter-ordering
      - L6-wire-format
      - L7-method-signature
      - L8-test-class-inventory
    rationale: >
      The element `description` (the second positional string of a Structurizr
      `element` / relationship declaration, e.g. the FunctionPoint synopsis) is a
      free-form narrative field with no altitude guard, exactly like an
      `allowed_claim`. Under the authority cascade (generated facts > DSL >
      Card/prose) the DSL tier sits ABOVE every prose surface and directly under
      the generated facts, so a runtime-detail leak in a `description` is MORE
      significant than the L0/L1 prose leaks the two existing helpers gate, and at
      least as significant as a ledger-claim leak. The ledger entry generalized
      the by-authority-surface insight to the Card/prose-tier ledger but stopped
      short of this strictly-higher tier; this row closes that under-scope. The
      descriptions demonstrably carry the same leaked categories the verdict named:
      a scan of the live fragments with the canonical probe library finds four
      function-point synopses leaking today — a concrete route x verb (fpCreateRun
      "POST /v1/runs", fpGetRunStatus "GET /v1/runs/(runId)", fpCancelRun
      "POST /v1/runs/(runId)/cancel ... DFA transition": L4, the last also a
      same-block L2 DFA-transition residue) and a method-call-and-dispatch arrow
      chain (fpEngineDispatch "EngineRegistry.resolve(envelope) -> typed
      ExecutorAdapter dispatch": L1). Those four are frozen in the dated grandfather
      list. The verdict's by-fact-id DSL scope was broader (the engineering-frames
      type rosters, the verification named-test runtime-behaviour phrases, and
      several other function-point arrow/sequence descriptions), but a concurrent
      DSL-altitude drain reduced those to claim-agnostic structural synopses, so the
      canonical probes no longer fire on them; they are NOT grandfathered (a row
      over zero live leak would be the dead weight the closed-list discipline
      forbids). The surface stays registered regardless of the current leak count
      because the `description` field carries no altitude guard, so a future
      hand-authored description on ANY of the four fragments must be held to this
      altitude the day it is written. The eventual enforcer (E202) reuses the SAME
      closed leaked-category vocabulary and the SAME imported trigger library as
      Rule G-27 / G-34 (one verdict, one probe set, now four surfaces), scans ONLY
      the element `description` string of each
      fragment listed in `scanned_fragments` (the structural `properties { saa.* }`
      keys — saa.id / saa.primaryPackage / saa.sourceAdr / saa.code_entrypoint_refs
      / saa.test_refs / saa.contract_op_refs — are the D2 development-view evidence
      index and a generated-fact pointer surface, NOT a behavioural claim, and are
      NEVER scanned, mirroring how E201 spares the ledger's structural keys), and
      reports a leak not redeemed by a still-open, element-precise row in the
      per-surface grandfather list. It would invent no id and no relationship and
      never outrank a generated fact — it reads the policy as the vocabulary and
      the DSL `description` as the data. The DSL fragments themselves are AUTHORED
      authority surfaces owned by their own waves / the reconcile step; this row
      does not edit them. capabilities.dsl is in `scanned_fragments` for
      completeness (its mounted descriptions are currently the generic
      "L1 capability mounted from architecture-status.yaml" boilerplate and carry
      no leak today), so a future hand-authored capability description is held to
      the same altitude the day it is written.
